name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  shellcheck-lite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify scripts are executable
        run: |
          test -x scripts/git/new-task-worktree.sh
          test -x scripts/git/cleanup-worktrees.sh
          test -x scripts/git/sync-with-main.sh
          test -x scripts/helpers/bootstrap-project.sh
